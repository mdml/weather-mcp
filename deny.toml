# cargo-deny configuration — the supply-chain verifier (ADR 0005).
# Run via `cargo deny check`; mirrored in CI. Schema: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default behavior: error on any RUSTSEC advisory. `cargo audit` runs the same
# database separately in CI; together they cover the supply-chain story.
yanked = "deny"

[licenses]
# Allow exactly the permissive licenses the current dependency tree pulls in. The
# project itself is Apache-2.0. Keep this list tight and add deliberately when `cargo
# deny check` flags a new transitive dependency — that's a human taste call, not a
# silent allow-all. (Unlicense covers memchr's `MIT OR Unlicense`; MIT also satisfies it.)
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    # Added with the reqwest+rustls HTTP client (Slice E). The rustls TLS stack pulls these
    # three new licenses; each is OSI-approved and permissive:
    "BSD-3-Clause",         # subtle (via rustls)
    "CDLA-Permissive-2.0",  # webpki-roots (via reqwest/hyper-rustls) — the trust-root data set
    "ISC",                  # ring, untrusted, rustls-webpki (the rustls TLS stack)
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# Don't fail the build on duplicate versions for now (transitive churn is noisy in a
# skeleton). Tighten later if a real duplication problem appears.
multiple-versions = "allow"
wildcards = "allow"

[sources]
# Only crates.io is expected. Fail if a dependency comes from an unknown registry/git.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
