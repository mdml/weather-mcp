# CI — the real merge gate (ADR 0005). Mirrors the local `just check` verifier stack
# plus the supply-chain checks (cargo-deny + cargo-audit). The human reviews a green
# checkmark, not every line. Docker/Fly are intentionally deferred (Phase 0 scope).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (fmt + clippy + build + nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins channel = stable + rustfmt/clippy; this action honors it.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install just + cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest

      # The full local verifier bar, run identically in CI.
      - name: just check
        run: just check

  supply-chain:
    name: supply-chain (cargo-deny + cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny + cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo deny check
        run: cargo deny check

      - name: cargo audit
        run: cargo audit
